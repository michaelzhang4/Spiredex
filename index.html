<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Slay the Spire 2 — Reference</title>
<style>
 :root{
  --bg:#13151a; --panel:#1c1f27; --panel2:#232733; --line:#2c313c; --line2:#3a4150;
  --text:#e7e9ee; --muted:#9aa3b2; --accent:#f0c674; --accent2:#e8b84b;
  --attack:#e06c75; --block:#61afef; --buff:#98c379; --debuff:#c678dd;
  --summon:#56b6c2; --status:#b6bcc7; --neutral:#8b93a3;
  --monster:#7fb3d5; --elite:#d98c5f; --boss:#e06c75; --ancient:#b48ead; --event:#98c379;
 }
 *{box-sizing:border-box}
 html,body{margin:0}
 body{background:var(--bg);color:var(--text);font:15px/1.55 "Segoe UI",Roboto,system-ui,sans-serif}
 a{color:var(--accent)}
 /* header */
 header{position:sticky;top:0;z-index:20;background:#171a20f5;backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
 .hrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 18px}
 .srcrow{padding:0 18px 9px}
 .src{font-size:12px;color:var(--muted)}
 .src.ok{color:var(--buff)}
 .brand{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:.3px;white-space:nowrap}
 .tabs{display:flex;gap:4px;flex-wrap:wrap}
 .tab{background:transparent;border:1px solid transparent;color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
 .tab:hover{color:var(--text);background:var(--panel2)}
 .tab.on{color:#1a1a1a;background:var(--accent);border-color:var(--accent)}
 .spacer{flex:1 1 20px}
 input[type=search]{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;font-size:14px;outline:none;min-width:210px;flex:0 1 280px}
 input[type=search]:focus{border-color:var(--accent)}
 .btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13.5px}
 .btn:hover{border-color:var(--accent);color:var(--accent)}
 .btn.primary{background:var(--accent);color:#1a1a1a;border-color:var(--accent);font-weight:700}
 .btn.primary:hover{background:var(--accent2)}
 .btn.mini{padding:4px 9px;font-size:12px}
 .toggle{display:inline-flex;gap:7px;align-items:center;user-select:none;cursor:pointer;color:var(--muted);font-size:13.5px;background:var(--panel2);border:1px solid var(--line);padding:7px 11px;border-radius:8px}
 .toggle input{accent-color:var(--accent)}
 /* layout */
 main{padding:16px 18px 70px;max-width:1800px;margin:0 auto}
 .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;align-items:start}
 .group-h{font-size:15px;color:var(--accent);margin:22px 2px 8px;border-bottom:1px solid var(--line);padding-bottom:5px;letter-spacing:.4px}
 .empty{color:var(--muted);text-align:center;padding:60px 20px;font-size:15px}
 .note-bar{color:var(--muted);font-size:13px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);padding:9px 13px;border-radius:8px;margin-bottom:14px}
 /* cards */
 .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
 .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
 .ename{margin:0;font-size:17px;color:var(--accent);font-weight:700}
 .ename .sub{color:var(--muted);font-size:12.5px;font-style:italic;font-weight:400}
 .typebadge{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap;border:1px solid var(--line2);color:var(--muted)}
 .t-monster{color:var(--monster);border-color:#33485e}
 .t-elite{color:var(--elite);border-color:#5e4433}
 .t-boss{color:var(--boss);border-color:#5e3338}
 .t-ancient{color:var(--ancient);border-color:#4e3f55}
 .t-event{color:var(--event);border-color:#3d5230}
 .grouprow{color:var(--muted);font-size:12px;margin-top:3px}
 .grouprow b{color:#cdd3dd}
 .hp{display:inline-block;margin-top:8px;background:#23311f;color:#bfe39a;border:1px solid #34492c;padding:2px 9px;border-radius:999px;font-size:12.5px;font-weight:600}
 .appears{margin-top:9px;display:flex;flex-wrap:wrap;gap:5px;align-items:center}
 .sec{margin-top:12px}
 .sec-label{font-size:10.5px;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
 .move{padding:7px 0;border-top:1px dashed var(--line)}
 .move:first-of-type{border-top:none;padding-top:2px}
 .mname{font-weight:600;color:#eef1f6;margin-bottom:5px}
 .chips{display:flex;flex-wrap:wrap;gap:5px}
 .chip{font-size:12.5px;padding:2px 8px;border-radius:6px;background:var(--panel2);border-left:3px solid var(--neutral);color:#d7dbe2}
 .chip.attack{border-left-color:var(--attack)} .chip.block{border-left-color:var(--block)}
 .chip.buff{border-left-color:var(--buff)} .chip.debuff{border-left-color:var(--debuff)}
 .chip.summon{border-left-color:var(--summon)} .chip.status{border-left-color:var(--status)}
 ul.notes,ul.pattern{margin:0;padding-left:0;list-style:none;display:flex;flex-direction:column;gap:5px}
 ul.notes li,ul.pattern li{font-size:13px;color:#c9ced8;padding-left:15px;position:relative}
 ul.notes li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
 ul.pattern li::before{content:"";position:absolute;left:2px;top:8px;width:5px;height:5px;border-radius:50%;background:var(--block)}
 .kw-term{color:var(--accent);font-weight:600}
 .arrow{color:var(--accent);font-weight:700;padding:0 1px}
 .kw{font-weight:600}
 .kw-attack{color:var(--attack)} .kw-block{color:var(--block)} .kw-buff{color:var(--buff)}
 .kw-debuff{color:var(--debuff)} .kw-summon{color:var(--summon)} .kw-status{color:var(--status)}
 .asc{color:var(--muted);opacity:.7;font-size:.95em}
 body.asc-on .asc{color:var(--accent);opacity:1;font-weight:600}
 body.asc-on .base{opacity:.45}
 /* acts */
 .actbar,.typebar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
 .actbtn{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600}
 .actbtn:hover{border-color:var(--accent)}
 .actbtn.on{background:var(--accent);color:#1a1a1a;border-color:var(--accent)}
 .actbtn b{color:var(--accent)}
 .actbtn.on b{color:#1a1a1a}
 .act-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px}
 .act-top h2{margin:0;font-size:22px;color:var(--accent)}
 .ancient-pool{margin:8px 0 18px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
 .apchip{font-size:12px;background:var(--panel2);border:1px solid var(--line2);color:#cdd3dd;padding:2px 9px;border-radius:999px;cursor:pointer}
 .apchip:hover{border-color:var(--accent);color:var(--accent)}
 .act-sec{margin:18px 0}
 .act-sec-title{font-size:15px;color:#dfe3ea;margin:0 0 10px;border-bottom:1px solid var(--line);padding-bottom:5px;letter-spacing:.4px}
 .tag{font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);padding:1px 7px;border-radius:999px}
 .enc-note{color:var(--muted);font-size:12.5px;margin:2px 2px 8px}
 .enc-extra{color:var(--muted);font-size:12.5px;margin-top:10px;padding-left:2px}
 .enc-extra .sec-label{display:inline}
 /* combats: each is a full-width collapsible panel */
 .combat-list{display:flex;flex-direction:column;gap:9px}
 details.combat{border:1px solid var(--line);border-radius:11px;background:var(--panel);overflow:hidden}
 details.combat[open]{border-color:var(--line2)}
 .combat-sum{list-style:none;cursor:pointer;display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:11px 14px}
 .combat-sum::-webkit-details-marker{display:none}
 .combat-sum:hover{background:var(--panel2)}
 details.combat[open]>.combat-sum{border-bottom:1px solid var(--line);background:var(--panel2)}
 .cs-chev{width:8px;height:8px;border-right:2px solid var(--accent);border-bottom:2px solid var(--accent);transform:rotate(-45deg);transition:transform .15s;flex:none;margin:0 3px 2px 1px}
 details.combat[open] .cs-chev{transform:rotate(45deg);margin-bottom:0;margin-top:2px}
 .cs-name{font-weight:700;color:var(--accent);font-size:15.5px}
 .cs-mons{display:flex;flex-wrap:wrap;gap:5px;margin-left:auto}
 .cs-mon{font-size:12px;padding:2px 9px;border-radius:999px;background:var(--panel);border:1px solid var(--line2);color:#cdd3dd}
 .cs-mon.t-monster{border-color:#33485e;color:var(--monster)}
 .cs-mon.t-elite{border-color:#5e4433;color:var(--elite)}
 .cs-mon.t-boss{border-color:#5e3338;color:var(--boss)}
 .combat-body{padding:0 14px 12px}
 /* one monster = one full-width row: identity | passives + moves + turn order */
 .mon-row{display:grid;grid-template-columns:minmax(150px,188px) 1fr;gap:16px;padding:14px 2px;border-top:1px dashed var(--line)}
 .mon-row:first-of-type{border-top:none}
 .mon-id{display:flex;flex-direction:column;gap:6px;align-items:flex-start}
 .mon-name{font-weight:700;color:#eef1f6;font-size:15px;line-height:1.25}
 .mon-x{color:var(--accent);font-weight:800}
 .mon-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
 .mon-group{color:var(--muted);font-size:11px}
 .mon-group b{color:#cdd3dd}
 .mon-sub{color:var(--muted);font-size:11.5px;font-style:italic}
 .mon-main{display:flex;flex-direction:column;gap:9px;min-width:0}
 .passives{display:flex;flex-wrap:wrap;gap:6px}
 .passive{font-size:12px;color:#c2c8d2;background:#20242e;border:1px solid var(--line);border-radius:6px;padding:3px 9px}
 .passive .kw-term{color:var(--accent);font-weight:600}
 /* move strip: Move 1, Move 2 ... laid out left-to-right (placement = which move) */
 .move-strip{display:flex;flex-wrap:wrap;gap:8px}
 .mv{flex:1 1 150px;min-width:138px;background:var(--panel2);border:1px solid var(--line);border-top:2px solid var(--mc,var(--neutral));border-radius:8px;padding:7px 9px}
 .mv-h{display:flex;align-items:center;gap:7px;margin-bottom:6px}
 .mv-n{flex:none;width:18px;height:18px;border-radius:50%;background:var(--mc,var(--neutral));color:#15171c;font-size:11.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
 .mv-name{font-weight:700;color:#eef1f6;font-size:13.5px;line-height:1.2}
 .mv .chips{display:flex;flex-direction:column;gap:4px}
 .mv .chip{font-size:12px;padding:2px 7px}
 .m1{--mc:#7fb3d5} .m2{--mc:#e0c074} .m3{--mc:#98c379} .m4{--mc:#c678dd} .m5{--mc:#56b6c2} .m6{--mc:#e0896c}
 /* turn-order timeline: position encodes order, ↻ marks the loop */
 .rotation{display:flex;flex-direction:column;gap:6px;background:#181b22;border:1px solid var(--line);border-radius:8px;padding:8px 11px}
 .rot-label{font-size:10px;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);font-weight:700}
 .rot-line{display:flex;flex-wrap:wrap;align-items:center;gap:7px}
 .seg{display:inline-flex;flex-wrap:wrap;align-items:center;gap:7px}
 .seg.loop{border:1px dashed var(--line2);border-radius:999px;padding:3px 9px 3px 11px;background:#1c2029}
 .seg-tag{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700}
 .seg-then{color:var(--muted);font-size:11.5px;font-style:italic;margin:0 2px}
 .turn{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:#e7e9ee;background:var(--panel2);border:1px solid var(--line2);border-left:3px solid var(--mc,var(--neutral));border-radius:6px;padding:3px 9px}
 .turn .tn{font-style:normal;width:15px;height:15px;border-radius:50%;background:var(--mc,var(--neutral));color:#15171c;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
 .rar{color:var(--accent);font-weight:800}
 .repeat{color:var(--accent);font-weight:800;font-size:15px;line-height:1}
 .rot-text{color:#aab1bd;font-size:12px;line-height:1.5}
 /* events */
 table.opts{width:100%;border-collapse:collapse;margin-top:8px;font-size:13px}
 table.opts td{border-top:1px solid var(--line);padding:7px 6px;vertical-align:top}
 .opt-name{font-weight:600;color:#dfe3ea;width:38%}
 .opt-effect{color:#c9ced8}
 .opt-notes{color:var(--muted);font-size:12px;margin-top:3px;font-style:italic}
 .opt-head td{color:var(--accent);font-weight:700;background:var(--panel2);border-top:1px solid var(--line2)}
 .cond{color:var(--debuff);font-size:12.5px;margin-top:4px}
 /* ancients */
 .anc-group{margin-top:12px}
 .anc-item{padding:7px 0;border-top:1px dashed var(--line)}
 .anc-name{font-weight:600;color:var(--accent2)}
 .anc-desc{color:#c9ced8;font-size:13px;margin-top:2px}
 /* mechanics */
 .mech .mech-item{padding:7px 0;border-top:1px dashed var(--line)}
 .mech .mech-item:first-of-type{border-top:none}
 .mech-label{font-weight:600;color:#dfe3ea}
 .mech-line{color:#c9ced8;font-size:13px;margin-top:2px}
 /* misc */
 .flash{animation:fl 1.6s ease}
 @keyframes fl{0%{box-shadow:0 0 0 2px var(--accent)}100%{box-shadow:0 0 0 0 transparent}}
 #status{position:fixed;left:50%;transform:translateX(-50%);bottom:18px;background:#222732;border:1px solid var(--accent);color:var(--accent);padding:9px 16px;border-radius:9px;font-size:13.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:50}
 #status.show{opacity:1}
 .drop{position:fixed;inset:0;background:rgba(19,21,26,.86);border:3px dashed var(--accent);display:none;align-items:center;justify-content:center;color:var(--accent);font-size:22px;z-index:100}
 .drop.show{display:flex}
 footer{color:var(--muted);font-size:12px;text-align:center;padding:8px 18px 26px;max-width:1800px;margin:0 auto}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <span class="brand">Slay the Spire 2</span>
    <div class="tabs">
      <button class="tab on" data-view="acts">Acts &amp; Encounters</button>
      <button class="tab" data-view="bestiary">Bestiary</button>
      <button class="tab" data-view="events">Events</button>
      <button class="tab" data-view="ancients">Ancients</button>

    <span class="spacer"></span>
    <input type="search" id="search" placeholder="Search enemies, moves, events, keywords...">
    <label class="toggle"><input type="checkbox" id="asc"> Ascension</label>
    <button class="btn primary" id="folderBtn" title="Pick your CSV folder; loads every reference CSV at once">&#128193; Load folder</button>
    <button class="btn" id="loadBtn" title="Load one or more individual CSV files">&#8595; Files</button>
    <button class="btn" id="resetBtn" title="Forget loaded CSVs; use built-in data">Reset</button>
    <input type="file" id="file" accept=".csv,text/csv" multiple style="display:none">
    <input type="file" id="folder" webkitdirectory directory multiple style="display:none">
  </div>
  <div class="hrow srcrow"><span id="src" class="src"></span></div>
</header>
<main><div id="content"></div></main>
<footer>Drag &amp; drop any of the reference CSVs onto the page to update them (matched by filename). Loaded CSVs are remembered in this browser; Reset restores the built-in copy.</footer>
<div id="status"></div>
<div class="drop" id="drop">Drop CSV files to update</div>

,"No encounter can be seen that shares a ""tag"" with the previous encounter.",Tags are listed next to encounters in the encounter lists for each act.

<script>/* Slay the Spire 2 Reference - pure logic library (no DOM).

(function (global) {
  "use strict";

  /* ============================ CSV ============================ */
  function parseCSV(text) {
    text = String(text).replace(/\r\n?/g, "\n");
    var rows = [], row = [], field = "", q = false, i = 0, c;

        field += c; i++; continue;
      }

      if (c === ",") { row.push(field); field = ""; i++; continue; }

  }

  }

  /* ====================== text formatting ===================== */
  function esc(s) {

  }
  var KW = [
    [/\bDamage\b/g, "attack"],
    [/\bBlock\b/g, "block"],
    [/\b(?:Summons?|Summoned|Hatch(?:es|ling)?)\b/g, "summon"],
    [/\b(?:Strength|Ritual|Dexterity|Thorns?|Artifact|Plating|Soar|Burrowed|Metallicize|Intangible|Regen|Galvanic|Vigor|Sandpit|Steam Eruption|Rampart)\b/g, "buff"],
    [/\b(?:Weak|Frail|Vulnerable|Constrict|Tender|Shrink|Tangled|Poison|Slow|Imbalanced|Chains of Binding)\b/g, "debuff"],
    [/\b(?:Dazed|Slimed|Toxic|Wounds?|Infection|Void|Burns?|Flutter|Beckon|Withers?)\b/g, "status"]

  function kwHi(s) { KW.forEach(function (p) { s = s.replace(p[0], function (m) { return '<span class="kw kw-' + p[1] + '">' + m + "</span>"; }); }); return s; }
  var ASC = /([0-9]+(?:\s*[-xX]\s*[0-9]+)*)\s*\(\s*([0-9]+(?:\s*[-xX]\s*[0-9]+)*)\s*\)/g;

    if (text == null) return "";

    s = kwHi(s);
    s = ascWrap(s);

    return s;
  }

    if (s.indexOf("damage") === 0) return "attack";
    if (s.indexOf("block") === 0) return "block";
    if (s.indexOf("summon") === 0) return "summon";
    if (s.indexOf("add") === 0 || s.indexOf("shuffle") === 0) return "status";
    if (s.indexOf("apply") === 0) return "debuff";
    if (s.indexOf("gain") === 0 || s.indexOf("strength") === 0 || s.indexOf("ritual") === 0 || s.indexOf("dexterity") === 0 || s.indexOf("heal") === 0 || s.indexOf("block") >= 0 && s.indexOf("gain") >= 0) return "buff";

  }
  function noteHtml(line) {
    var idx = line.indexOf(":");
    if (idx > 0 && idx <= 30 && /^[A-Z(]/.test(line)) {

    "Kin Priest": "The Kin", "Kin Follower": "The Kin",
    "Flail Knight": "Knights", "Spectral Knight": "Knights", "Magi Knight": "Knights",
    "Torch Head Amalgam": "Queen"

  function parseStatBlocks(rows, type) {
    var list = [], cur = null, c, r;
    for (r = 1; r < rows.length; r++) {
      var cells = rows[r] || [];
      var get = function (k) { return (cells[k] == null ? "" : String(cells[k])).trim(); };
      var name = get(0), hp = get(1), notes = get(8), patt = get(9), mc = [];
      for (c = 2; c <= 7; c++) mc[c] = get(c);

      var onlyName = name !== "" && hp === "" && notes === "" && patt === "" && !hasMove;
      if (onlyName) continue;                       // group header (e.g. "Kaiser Crab") -> skip

      m.movesArr = m.order.map(function (k) { return m.moves[k]; });
      var nn = m.hp.match(/\d+/); m.hpNum = nn ? parseInt(nn[0], 10) : 0;
      var bits = [m.name, m.sub, m.group, m.hp];
      m.movesArr.forEach(function (mv) { bits.push(mv.name); mv.fx.forEach(function (f) { bits.push(f); }); });
      m.notes.forEach(function (x) { bits.push(x); }); m.patt.forEach(function (x) { bits.push(x); });
      m.search = bits.join(" ").toLowerCase();
      m.id = slug(m.type + "-" + (m.group ? m.group + "-" : "") + m.name);
    });
    return list;
  }

  /* ============== name resolution (act refs -> entities) ========= */
  // Some act references use a different size word than the stat block name
  // ("Twig Slime (Small)" vs "Twig Slime (S)"). Canonicalize to the long form.
  function expandSize(s) { return s.replace(/\(s\)/g, "(small)").replace(/\(m\)/g, "(medium)").replace(/\(l\)/g, "(large)"); }
  var EXTRA_ALIASES = { "torch head amalgam": ["torch amalgam"] };
  function buildIndex(entities) {
    var idx = {};
    function add(key, e) {
      key = String(key).toLowerCase().trim(); if (!key) return;
      if (!idx[key]) idx[key] = e;

      add(e.name, e);
      var m = e.name.toLowerCase().match(/^(.*?)\s*\(([^)]+)\)\s*$/);
      if (m) { var base = m[1].trim(), q = m[2].trim(); add(q + " " + base, e); add(base + " " + q, e); }
      if (e.group) { add(e.group + " " + e.name, e); add(e.group + " (" + e.name + ")", e); }
      (EXTRA_ALIASES[e.name.toLowerCase()] || []).forEach(function (k) { add(k, e); });
    });
    return idx;
  }
  function refLabel(raw) { return String(raw).replace(/\n+/g, " ").trim(); }
  function resolveRef(raw, idx) {
    if (!raw) return null;
    var s = String(raw).toLowerCase().replace(/\n+/g, " ");
    s = s.replace(/^\s*\d+\s*/, "");                  // leading count
    s = s.replace(/^\s*(?:or|either|and)\s+/, "");     // connectives
    s = s.replace(/\brandom\b/g, " ").replace(/\bat most 1 of each\b/g, " ");

    var sCut = s.replace(/\s*[,:].*$/, "").trim();      // drop trailing ", either:" etc.

    tries.push(sCut.replace(/s$/, ""));                 // trailing plural
    tries.push(sCut.replace(/^(\S+?)s\b/, "$1"));       // first-word plural ("scrolls of biting")

    if (first && first.length > 3) tries.push(first);   // last resort: leading word
    for (var i = 0; i < tries.length; i++) {
      var t = tries[i].trim(); if (!t) continue;
      if (idx[t]) return idx[t];
      var ex = expandSize(t); if (idx[ex]) return idx[ex];
    }
    return null;
  }

  /* ========================== Act files ======================= */
  function classifyHeader(c0) {
    var s = c0.toLowerCase();
    if (/easy\s+pool/.test(s)) return "easy";
    if (/hard\s+pool/.test(s)) return "hard";
    if (/^elites?\b/.test(s)) return "elites";
    if (/^boss(es)?\b/.test(s)) return "bosses";
    if (/^events?\b/.test(s)) return "events";
    if (/^ancients?\b/.test(s)) return "ancients";

  }
  function parseAct(rows) {
    var act = { title: cell(rows, 0, 0) || "Act", ancients: [], events: [], sections: [] };
    var mode = null, section = null, enc = null, monStart = 1, tagCol = -1;
    function findCols(r) {
      monStart = -1; tagCol = -1; var c = rows[r] || [];
      for (var k = 0; k < c.length; k++) {
        var v = (c[k] || "").trim().toLowerCase();

      if (c0 && !restNonEmpty) { cur = { name: c0, groups: [] }; list.push(cur); continue; }

  /* ===================== HTML string builders ================= */

  }

  /* ---- turn-order parsing: derive an ordered rotation from Attack Pattern text.

  function normName(s) { return String(s == null ? "" : s).toLowerCase().replace(/[^a-z0-9 ]+/g, " ").replace(/\s+/g, " ").trim(); }
  function moveIndexByName(movesArr, token) {

  function cleanToken(s) {

      .replace(/\b(?:until|then|after|before|if|when|once|while|chosen|chooses|picks|randomly|equally|allowed)\b.*$/i, "")

  function chainSteps(str, movesArr) {

      seg.push({ kind: "loop", steps: chainSteps(m[2], movesArr) });
    } else if (m = raw.match(/(?:cycl\w*|alternat\w*)\s+(?:through|between\s+)?([A-Za-z0-9].*?)(?:\.|$)/i)) {
      seg.push({ kind: "loop", steps: chainSteps(m[1], movesArr) });
    } else if ((m = raw.match(/^always uses\s+([^.]+)/i)) || (m = raw.match(/\buses\s+([^.]+?)\s+every turn/i))) {
      seg.push({ kind: "loop", steps: chainSteps(m[1], movesArr) });
    } else if (/->/.test(raw) && (m = raw.match(/^starts?\s+with\s+(.+?)(?:\.|$)/i))) {
      seg.push({ kind: "seq", steps: chainSteps(m[1], movesArr) });
    } else if (m = raw.match(/([A-Za-z0-9][^.]*?(?:\s*-\s*>\s*[^.]+)+)/)) {
      seg.push({ kind: "loop", steps: chainSteps(m[1], movesArr) });
    }
    seg = seg.filter(function (s) { return s.steps && s.steps.length; });
    var total = seg.reduce(function (n, s) { return n + s.steps.length; }, 0);
    if (!seg.length) return null;
    if (total === 1 && seg[0].kind !== "loop") return null;   // a lone non-looping move isn't a rotation
    return { segments: seg };
  }
  function rotSteps(steps) {
    return steps.map(function (st, i) {
      var cls = "turn" + (st.mi >= 0 ? " m" + (st.mi + 1) : "");
      var num = st.mi >= 0 ? '<i class="tn">' + (st.mi + 1) + "</i>" : "";
      return (i ? '<span class="rar">&#8594;</span>' : "") + '<span class="' + cls + '">' + num + esc(st.label) + "</span>";
    }).join("");
  }
  function rotationHtml(e) {
    var parsed = null, i;
    for (i = 0; i < e.patt.length; i++) { parsed = parseRotation(e.patt[i], e.movesArr); if (parsed) break; }
    if (!parsed && !e.patt.length) return "";
    var h = '<div class="rotation"><span class="rot-label">Turn order</span>';
    if (parsed) {
      h += '<div class="rot-line">' + parsed.segments.map(function (s) {
        if (s.kind === "loop") return '<span class="seg loop">' + rotSteps(s.steps) + '<span class="repeat" title="repeats">&#8635;</span></span>';
        if (s.kind === "start") return '<span class="seg start"><span class="seg-tag">start</span>' + rotSteps(s.steps) + "</span>";
        return '<span class="seg">' + rotSteps(s.steps) + "</span>";
      }).join('<span class="seg-then">then</span>') + "</div>";
    }
    if (e.patt.length) h += '<div class="rot-text">' + e.patt.map(function (p) { return fmt(p); }).join("<br>") + "</div>";
    return h + "</div>";
  }
  // one monster = one full-width row: identity | passives + moves (Move 1..N) + turn order
  function combatMonRowHtml(e, label, count) {
    var h = '<div class="mon-row">';
    h += '<div class="mon-id"><div class="mon-name">' + esc(label || e.name) + (count > 1 ? ' <span class="mon-x">&#215;' + count + "</span>" : "") + "</div>";
    h += '<div class="mon-meta"><span class="typebadge t-' + esc(e.type) + '">' + esc(e.type) + "</span>";
    if (e.group) h += '<span class="mon-group">part of <b>' + esc(e.group) + "</b></span>";
    h += "</div>";
    h += '<div class="hp">&#10084; ' + fmt(e.hp) + "</div>";
    if (e.sub) h += '<div class="mon-sub">' + esc(e.sub) + "</div>";
    h += "</div>";                                  // mon-id
    h += '<div class="mon-main">';
    if (e.notes.length) {
      h += '<div class="passives">';
      e.notes.forEach(function (n) { h += '<span class="passive">' + noteHtml(n) + "</span>"; });
      h += "</div>";
    }
    if (e.movesArr.length) {
      h += '<div class="move-strip">';
      e.movesArr.forEach(function (mv, i) {
        var n = i + 1;
        h += '<div class="mv m' + n + '"><div class="mv-h"><span class="mv-n">' + n + '</span><span class="mv-name">' + esc(mv.name || ("Move " + n)) + "</span></div>";
        if (mv.fx.length) {
          h += '<div class="chips">';
          mv.fx.forEach(function (f) { var c = fxClass(f); h += '<span class="chip' + (c ? " " + c : "") + '">' + fmt(f) + "</span>"; });
          h += "</div>";
        }
        h += "</div>";
      });
      h += "</div>";
    }
    h += rotationHtml(e);
    return h + "</div></div>";                      // mon-main, mon-row
  }
  // a combat = a full-width collapsible panel; open it and every monster shows at once
  function encounterHtml(enc, idx) {
    var seen = {}, order = [], extra = [];
    enc.monsters.forEach(function (raw) {
      var e = resolveRef(raw, idx);
      if (!e) { extra.push(refLabel(raw)); return; }
      if (!seen[e.id]) { seen[e.id] = { e: e, label: refLabel(raw), count: 0 }; order.push(e.id); }
      seen[e.id].count++;                            // collapse duplicates (Inklet, Inklet, Inklet -> x3)
    });
    enc.notes.forEach(function (nt) { extra.push(refLabel(nt)); });
    var rows = order.map(function (id) { return seen[id]; });
    var h = '<details class="combat"><summary class="combat-sum"><span class="cs-chev"></span><span class="cs-name">' + esc(enc.name) + "</span>";
    if (enc.tags && enc.tags.length) h += enc.tags.map(function (t) { return '<span class="tag">' + esc(t) + "</span>"; }).join("");
    h += '<span class="cs-mons">' + rows.map(function (r) {
      return '<span class="cs-mon t-' + esc(r.e.type) + '">' + esc(r.label) + (r.count > 1 ? " &#215;" + r.count : "") + "</span>";
    }).join("") + "</span></summary>";
    h += '<div class="combat-body">';
    if (enc.note) h += '<div class="enc-note">' + fmt(enc.note) + "</div>";
    rows.forEach(function (r) { h += combatMonRowHtml(r.e, r.label, r.count); });
    if (extra.length) h += '<div class="enc-extra"><span class="sec-label">Also / variable</span><br>' + extra.map(function (u) { return fmt(u); }).join("<br>") + "</div>";
    return h + "</div></details>";
  }
  var SECTION_TITLES = { easy: "Easy-pool combats", hard: "Hard-pool combats", elites: "Elites", bosses: "Bosses", events: "Events" };
  function actHtml(act, idx) {
    var h = '<div class="act">';
    h += '<div class="act-top"><h2>' + esc(act.title) + "</h2>";
    h += '<button class="btn mini" data-action="expand-act">Expand all</button>';
    h += '<button class="btn mini" data-action="collapse-act">Collapse all</button></div>';
    if (act.ancients && act.ancients.length) {
      h += '<div class="ancient-pool"><span class="sec-label">Ancient pool</span> ' +
        act.ancients.map(function (a) { return '<span class="apchip" data-jump-ancient="' + esc(a) + '">' + esc(a) + "</span>"; }).join("") + "</div>";
    }
    act.sections.forEach(function (sec) {
      if (sec.kind === "events") return; // events listed separately below
      h += '<div class="act-sec"><h3 class="act-sec-title">' + esc(SECTION_TITLES[sec.kind] || sec.label) + "</h3>";
      h += '<div class="combat-list">';
      sec.encounters.forEach(function (enc) { h += encounterHtml(enc, idx); });
      h += "</div></div>";
    });
    if (act.events && act.events.length) {
      h += '<div class="act-sec"><h3 class="act-sec-title">Events</h3><div class="event-links">';
      h += act.events.map(function (ev) { return '<span class="apchip" data-jump-event="' + esc(ev) + '">' + esc(ev) + "</span>"; }).join("");
      h += "</div></div>";
    }
    return h + "</div>";
  }
  function eventCardHtml(ev) {
    var h = '<div class="card event" id="evt-' + esc(slug(ev.name)) + '">';
    h += '<div class="card-head"><h3 class="ename">' + esc(ev.name) + "</h3>";
    h += '<span class="typebadge t-event">' + esc(ev.act.replace(/:.*/, "")) + "</span></div>";
    if (ev.cond) h += '<div class="cond">' + fmt(ev.cond) + "</div>";
    h += '<table class="opts"><tbody>';
    ev.options.forEach(function (o) {
      if (o.name && !o.effect && !o.notes) { h += '<tr class="opt-head"><td colspan="2">' + fmt(o.name) + "</td></tr>"; return; }
      h += "<tr><td class=\"opt-name\">" + fmt(o.name) + "</td><td class=\"opt-effect\">" + fmt(o.effect) +
        (o.notes ? '<div class="opt-notes">' + fmt(o.notes) + "</div>" : "") + "</td></tr>";
    });
    h += "</tbody></table>";
    return h + "</div>";
  }
  function ancientCardHtml(a) {
    var h = '<div class="card ancient" id="anc-' + esc(slug(a.name)) + '"><div class="card-head"><h3 class="ename">' + esc(a.name) + "</h3>";
    h += '<span class="typebadge t-ancient">Ancient</span></div>';
    a.groups.forEach(function (g) {
      h += '<div class="anc-group"><div class="sec-label">' + esc(g.label) + "</div>";
      g.items.forEach(function (it) {
        h += '<div class="anc-item"><div class="anc-name">' + esc(it.name) + "</div><div class=\"anc-desc\">" + fmt(it.desc) + "</div></div>";
      });
      h += "</div>";
    });
    return h + "</div>";
  }
  function mechanicsHtml(sections) {
    var h = "";
    sections.forEach(function (s) {
      h += '<div class="card mech"><h3 class="ename">' + esc(s.title) + "</h3>";
      s.items.forEach(function (it) {
        h += '<div class="mech-item">';
        if (it.label) h += '<div class="mech-label">' + fmt(it.label) + "</div>";
        it.lines.forEach(function (ln) { h += '<div class="mech-line">' + fmt(ln) + "</div>"; });
        h += "</div>";
      });
      h += "</div>";
    });
    return h;
  }

  var api = {
    parseCSV: parseCSV, parseStatBlocks: parseStatBlocks, parseAct: parseAct, parseEvents: parseEvents,
    parseAncients: parseAncients, parseMechanics: parseMechanics,
    buildIndex: buildIndex, resolveRef: resolveRef, refLabel: refLabel,
    fmt: fmt, esc: esc, slug: slug,
    statCardHtml: statCardHtml, encounterHtml: encounterHtml,
    actHtml: actHtml, eventCardHtml: eventCardHtml, ancientCardHtml: ancientCardHtml, mechanicsHtml: mechanicsHtml
  };
  if (typeof module !== "undefined" && module.exports) module.exports = api;
  global.STS = api;
})(typeof window !== "undefined" ? window : this);
</script>
<script>/* Slay the Spire 2 Reference - DOM bootstrap & views (browser only) */
(function () {
  "use strict";
  var $ = function (s, r) { return (r || document).querySelector(s); };
  var LS = "sts2:";

  var FILES = [
    { key: "monsters", id: "csv-monsters", match: /monsters/i, label: "Monsters" },
    { key: "elites", id: "csv-elites", match: /elites/i, label: "Elites" },
    { key: "bosses", id: "csv-bosses", match: /bosses/i, label: "Bosses" },
    { key: "ancients", id: "csv-ancients", match: /ancients/i, label: "Ancients" },
    { key: "events", id: "csv-events", match: /events/i, label: "Events" },
    { key: "mechanics", id: "csv-mechanics", match: /mechanics/i, label: "Mechanics" },
    { key: "act-overgrowth", id: "csv-act-overgrowth", match: /overgrowth/i, label: "Act 1: Overgrowth" },
    { key: "act-underdocks", id: "csv-act-underdocks", match: /underdocks/i, label: "Act 1: Underdocks" },
    { key: "act-hive", id: "csv-act-hive", match: /hive/i, label: "Act 2: Hive" },
    { key: "act-glory", id: "csv-act-glory", match: /glory/i, label: "Act 3: Glory" }
  ];
  var ACT_KEYS = [
    { key: "act-overgrowth", short: "1 · Overgrowth" },
    { key: "act-underdocks", short: "1 · Underdocks" },
    { key: "act-hive", short: "2 · Hive" },
    { key: "act-glory", short: "3 · Glory" }
  ];

  var SOURCE = {};              // key -> "loaded" | "builtin"
  var D = {};                   // parsed datasets
  var state = { view: "acts", act: "act-overgrowth", q: "", betype: "all" };

  // CSV text for a dataset: a copy you loaded into this browser, else the built-in snapshot.
  function getRaw(f) {
    try { var v = localStorage.getItem(LS + f.key); if (v && v.trim()) { SOURCE[f.key] = "loaded"; return v; } } catch (e) {}
    SOURCE[f.key] = "builtin";
    var el = document.getElementById(f.id);
    return el ? (el.textContent || "").trim() : "";
  }
  function updateSourceLabel() {
    var el = $("#src");
    if (FILES.some(function (f) { return SOURCE[f.key] === "loaded"; })) { el.textContent = "● using CSVs you loaded"; el.className = "src ok"; }
    else { el.textContent = "● built-in data"; el.className = "src"; }
    el.title = "Built-in data is baked into this file. Load CSVs (button or drag-drop) to view newer data; it is remembered in this browser until you Reset.";
  }

  function rebuild() {
    var RAW = {};
    FILES.forEach(function (f) { RAW[f.key] = getRaw(f); });
    D.monsters = STS.parseStatBlocks(STS.parseCSV(RAW["monsters"] || ""), "monster");
    D.elites = STS.parseStatBlocks(STS.parseCSV(RAW["elites"] || ""), "elite");
    D.bosses = STS.parseStatBlocks(STS.parseCSV(RAW["bosses"] || ""), "boss");
    D.all = D.monsters.concat(D.elites, D.bosses);
    D.idx = STS.buildIndex(D.all);
    D.acts = {};
    ACT_KEYS.forEach(function (a) { D.acts[a.key] = STS.parseAct(STS.parseCSV(RAW[a.key] || "")); });
    D.events = STS.parseEvents(STS.parseCSV(RAW["events"] || ""));
    D.ancients = STS.parseAncients(STS.parseCSV(RAW["ancients"] || ""));
    D.mechanics = STS.parseMechanics(STS.parseCSV(RAW["mechanics"] || ""));
    D.events.forEach(function (e) {
      e._s = (e.name + " " + e.cond + " " + e.options.map(function (o) { return o.name + " " + o.effect + " " + o.notes; }).join(" ")).toLowerCase();
    });
    D.ancients.forEach(function (a) {
      a._s = (a.name + " " + a.groups.map(function (g) {
        return g.items.map(function (i) { return i.name + " " + i.desc; }).join(" ");
      }).join(" ")).toLowerCase();
    });
    D.all.forEach(function (e) { e.appearsIn = []; e._ap = {}; });
    Object.keys(D.acts).forEach(function (ak) {
      var act = D.acts[ak], shortName = (ACT_KEYS.filter(function (x) { return x.key === ak; })[0] || {}).short || act.title;
      act.sections.forEach(function (sec) {
        if (sec.kind === "events") return;
        sec.encounters.forEach(function (enc) {
          enc.monsters.forEach(function (raw) {
            var e = STS.resolveRef(raw, D.idx); if (!e) return;
            var k = ak + "|" + enc.name; if (e._ap[k]) return; e._ap[k] = 1;
            e.appearsIn.push({ actKey: ak, label: shortName + " · " + enc.name });
          });
        });
      });
    });
  }

  /* ----------------------------- views ----------------------------- */
  function matchQ(s) { return !state.q || s.indexOf(state.q) >= 0; }

  function viewActs() {
    var bar = '<div class="actbar">' + ACT_KEYS.map(function (a) {
      return '<button class="actbtn' + (state.act === a.key ? " on" : "") + '" data-act="' + a.key + '">' + STS.esc(a.short) + "</button>";
    }).join("") + "</div>";
    var act = D.acts[state.act];
    if (!act) return bar + '<div class="empty">No data.</div>';
    if (state.q) act = filterAct(act, state.q);
    return bar + STS.actHtml(act, D.idx);
  }
  function filterAct(act, q) {
    var copy = { title: act.title, ancients: act.ancients, events: act.events.filter(function (n) { return n.toLowerCase().indexOf(q) >= 0; }), sections: [] };
    act.sections.forEach(function (sec) {
      if (sec.kind === "events") return;
      var encs = sec.encounters.filter(function (enc) {
        var hay = (enc.name + " " + enc.tags.join(" ") + " " + enc.monsters.join(" ") + " " + enc.notes.join(" ")).toLowerCase();
        if (hay.indexOf(q) >= 0) return true;
        return enc.monsters.some(function (raw) { var e = STS.resolveRef(raw, D.idx); return e && e.search.indexOf(q) >= 0; });
      });
      if (encs.length) copy.sections.push({ kind: sec.kind, label: sec.label, encounters: encs });
    });
    return copy;
  }

  function viewBestiary() {
    var types = [["all", "All"], ["monster", "Monsters"], ["elite", "Elites"], ["boss", "Bosses"]];
    var bar = '<div class="typebar">' + types.map(function (t) {
      var n = t[0] === "all" ? D.all.length : D.all.filter(function (e) { return e.type === t[0]; }).length;
      return '<button class="actbtn' + (state.betype === t[0] ? " on" : "") + '" data-betype="' + t[0] + '">' + t[1] + " <b>" + n + "</b></button>";
    }).join("") + "</div>";
    var list = D.all.filter(function (e) { return (state.betype === "all" || e.type === state.betype) && matchQ(e.search); });
    if (!list.length) return bar + '<div class="empty">No enemies match your search.</div>';
    return bar + '<div class="grid">' + list.map(function (e) { return STS.statCardHtml(e, { appears: true }); }).join("") + "</div>";
  }

  function viewEvents() {
    var acts = [], byAct = {};
    D.events.forEach(function (e) { if (!byAct[e.act]) { byAct[e.act] = []; acts.push(e.act); } byAct[e.act].push(e); });
    var h = "", any = false;
    acts.forEach(function (a) {
      var evs = byAct[a].filter(function (e) { return matchQ(e._s); });
      if (!evs.length) return; any = true;
      h += '<h2 class="group-h">' + STS.esc(a) + "</h2><div class=\"grid\">" + evs.map(STS.eventCardHtml).join("") + "</div>";
    });
    return any ? h : '<div class="empty">No events match your search.</div>';
  }

  function viewAncients() {
    var list = D.ancients.filter(function (a) { return matchQ(a._s); });
    if (!list.length) return '<div class="empty">No ancients match your search.</div>';
    return '<div class="note-bar">Ancients are run modifiers chosen at the start of each act. Each offers a pool of relic/card options.</div>' +
      '<div class="grid">' + list.map(STS.ancientCardHtml).join("") + "</div>";
  }

  function viewMechanics() {
    var secs = D.mechanics;
    if (state.q) {
      secs = D.mechanics.map(function (s) {
        var items = s.items.filter(function (it) { return (it.label + " " + it.lines.join(" ")).toLowerCase().indexOf(state.q) >= 0; });
        return (s.title.toLowerCase().indexOf(state.q) >= 0) ? s : { title: s.title, items: items };
      }).filter(function (s) { return s.items.length; });
    }
    if (!secs.length) return '<div class="empty">No mechanics match your search.</div>';
    return '<div class="grid">' + STS.mechanicsHtml(secs) + "</div>";
  }

  function render() {
    var c = $("#content"), html = "";
    if (state.view === "acts") html = viewActs();
    else if (state.view === "bestiary") html = viewBestiary();
    else if (state.view === "events") html = viewEvents();
    else if (state.view === "ancients") html = viewAncients();
    else if (state.view === "mechanics") html = viewMechanics();
    c.innerHTML = html;
    window.scrollTo(0, 0);
    document.querySelectorAll(".tab").forEach(function (t) { t.classList.toggle("on", t.getAttribute("data-view") === state.view); });
  }
  function refresh() { rebuild(); render(); updateSourceLabel(); }

  /* --------------------------- interactions ------------------------ */
  function setView(v) { state.view = v; render(); }
  function flash(msg) { var el = $("#status"); el.textContent = msg; el.classList.add("show"); setTimeout(function () { el.classList.remove("show"); }, 4000); }

  function loadFiles(fileList) {
    var arr = Array.prototype.slice.call(fileList || []).filter(function (file) { return /\.csv$/i.test(file.name); });
    if (!arr.length) { flash("No .csv files found there"); return; }
    var done = 0, matched = [], skipped = [];
    arr.forEach(function (file) {
      var f = FILES.filter(function (x) { return x.match.test(file.name); })[0];
      var rd = new FileReader();
      rd.onload = function () {
        if (f) { try { localStorage.setItem(LS + f.key, rd.result); } catch (e) {} matched.push(f.label); }
        else skipped.push(file.name);
        if (++done === arr.length) { refresh(); flash(matched.length ? ("Loaded: " + matched.join(", ")) : "No recognised CSV filenames"); }
      };
      rd.readAsText(file);
    });
  }

  function jumpTo(id, view) {
    setView(view);
    var el = document.getElementById(id);
    if (el) { el.scrollIntoView({ behavior: "smooth", block: "start" }); el.classList.add("flash"); setTimeout(function () { el.classList.remove("flash"); }, 1600); if (el.tagName === "DETAILS") el.open = true; }
  }

  function wire() {
    document.querySelectorAll(".tab").forEach(function (t) { t.addEventListener("click", function () { setView(t.getAttribute("data-view")); }); });
    var search = $("#search");
    search.addEventListener("input", function () { state.q = this.value.trim().toLowerCase(); render(); });
    $("#asc").addEventListener("change", function () { document.body.classList.toggle("asc-on", this.checked); });
    $("#loadBtn").addEventListener("click", function () { $("#file").click(); });
    $("#file").addEventListener("change", function () { loadFiles(this.files); this.value = ""; });
    $("#folderBtn").addEventListener("click", function () { $("#folder").click(); });
    $("#folder").addEventListener("change", function () { loadFiles(this.files); this.value = ""; });
    $("#resetBtn").addEventListener("click", function () {
      if (!confirm("Forget the CSVs you loaded into this browser and go back to the built-in data?")) return;
      FILES.forEach(function (f) { try { localStorage.removeItem(LS + f.key); } catch (e) {} });
      refresh(); flash("Reset to built-in data");
    });

    $("#content").addEventListener("click", function (ev) {
      var a = ev.target.closest("[data-act]"); if (a) { state.act = a.getAttribute("data-act"); state.q = ""; search.value = ""; render(); return; }
      var bt = ev.target.closest("[data-betype]"); if (bt) { state.betype = bt.getAttribute("data-betype"); render(); return; }
      var ja = ev.target.closest("[data-jump-act]"); if (ja) { state.act = ja.getAttribute("data-jump-act"); state.q = ""; search.value = ""; setView("acts"); return; }
      var je = ev.target.closest("[data-jump-event]"); if (je) { jumpTo("evt-" + STS.slug(je.getAttribute("data-jump-event")), "events"); return; }
      var jn = ev.target.closest("[data-jump-ancient]"); if (jn) { jumpTo("anc-" + STS.slug(jn.getAttribute("data-jump-ancient")), "ancients"); return; }
      var ex = ev.target.closest('[data-action="expand-act"]'); if (ex) { ev.target.closest(".act").querySelectorAll("details").forEach(function (d) { d.open = true; }); return; }
      var co = ev.target.closest('[data-action="collapse-act"]'); if (co) { ev.target.closest(".act").querySelectorAll("details").forEach(function (d) { d.open = false; }); return; }
    });

    var drop = $("#drop"), dc = 0;
    window.addEventListener("dragenter", function (e) { e.preventDefault(); dc++; drop.classList.add("show"); });
    window.addEventListener("dragover", function (e) { e.preventDefault(); });
    window.addEventListener("dragleave", function (e) { e.preventDefault(); dc--; if (dc <= 0) drop.classList.remove("show"); });
    window.addEventListener("drop", function (e) { e.preventDefault(); dc = 0; drop.classList.remove("show"); loadFiles(e.dataTransfer.files); });
  }

  wire();
  refresh();
